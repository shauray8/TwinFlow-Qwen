fallback_strategy: "closest"  # Options: "closest", "crop_to_square", "skip"
min_bucket_size: 50
max_scale_factor: 1.5
base_batch_size: 4
base_pixels: 1763584  # 1328*1328
smart_crop: true
crop_strategy: "center_weighted"  # Options: "center", "center_weighted", "entropy"
