buckets:
  # Square (1:1)
  - name: "1:1"
    height: 1328
    width: 1328
    aspect_ratio: 1.0
    tolerance: 0.15 
  
  # Landscape 16:9
  - name: "16:9"
    height: 928
    width: 1664
    aspect_ratio: 0.558  # 928/1664
    tolerance: 0.12
  
  # Portrait 9:16
  - name: "9:16"
    height: 1664
    width: 928
    aspect_ratio: 1.793  # 1664/928
    tolerance: 0.12
  
  # Landscape 4:3
  - name: "4:3"
    height: 1104
    width: 1472
    aspect_ratio: 0.75  # 1104/1472
    tolerance: 0.10
  
  # Portrait 3:4
  - name: "3:4"
    height: 1472
    width: 1104
    aspect_ratio: 1.333  # 1472/1104
    tolerance: 0.10
  
  # Landscape 3:2
  - name: "3:2"
    height: 1056
    width: 1584
    aspect_ratio: 0.667  # 1056/1584
    tolerance: 0.08
  
  # Portrait 2:3
  - name: "2:3"
    height: 1584
    width: 1056
