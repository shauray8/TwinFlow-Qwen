model:
  model_name: QwenImage # modify to QwenImageEdit uses editing model
  aux_time_embed: true
  model_path: path/to/Qwen-Image

data:
  height: 512
  width: 512
  train_dirs:
    - path/to/data
    
method:
  method_type: TwinFlow
  transport_type: Linear
  consistc_ratio: 1.0
  enhanced_ratio: 0.8
  ema_decay_rate: 0.0 # because we did not load EMA model, so set to 0
  enhanced_range: [0.0, 1.0]
  time_dist_ctrl: [1.0, 1.0, 1.0]
  estimate_order: 2
  loss_func_type: {"type": "barron_reweighting", "alpha": 1.0}
  dist_match_cof: 0.5
  use_image_free: false
  use_rl: true
  rl_warmup_steps: 2000  # Start RL after 2K steps (cold start)
  rl_weight: 0.05  # Conservative weight to avoid reward hacking
  reward_model_type: "hpsv2"  # Options: hpsv2, pickscore, imagereward
  reward_model_cache: "./reward_models_cache"

  # NEW: Dynamic Cold Start Configuration
  use_dynamic_renoise: true
  renoise_schedule: [4.0, 1.0, 3000]  # [start_bias, end_bias, decay_steps]

# few-step sampling
sample:
  ckpt: "700"
  cfg_scale: 0
  cfg_interval: [0.00, 0.00]
  sampling_steps: 2 # 1
  stochast_ratio: 1.0 # 0.8
  extrapol_ratio: 0.0
  sampling_order: 1
  time_dist_ctrl: [1.0, 1.0, 1.0]
  rfba_gap_steps: [0.001, 0.7]
  sampling_style: few

# # any-step sampling
# sample:
