#   sampling_style: mul

train:
  load_checkpoint_path: ""
  output_dir: ../outputs
  seed: 42
  grad_accumulation_steps: 1
  micro_batch_size: 4
  num_train_epochs: 4
  optimizer: adamw
  lr: 1.0e-5
  betas:
    - 0.9
    - 0.99
  weight_decay: 0.0
  max_grad_norm: 1.0
